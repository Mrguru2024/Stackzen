name: Security tests

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  security:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Verify security program (files & static checks)
        run: npm run verify:security

      - name: Run security test suite
        run: npm run test:security
        env:
          NODE_ENV: test
          BANK_TOKEN_ENCRYPTION_KEY: ci-test-encryption-key-32chars-min
          NEXTAUTH_SECRET: ci-test-nextauth-secret-32chars-minimum
